version: '3.8'

services:
  backend:
    build: .
    container_name: study-helper-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGODB_URI=mongodb://mongo:27017/ai_study_helper
    depends_on:
      - mongo
    restart: unless-stopped
    volumes:
      - ./uploads:/app/uploads

  mongo:
    image: mongo:latest
    container_name: study-helper-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: study-helper-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  mongo_data:
